name: Matrix Build
on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        platform: [ubuntu-latest, ubuntu-22.04, ubuntu-20.04, macos-latest, macos-13, macos-12, windows-latest, windows-2022, windows-2019]
        node-version: [14, 16, 18, 20, 21, 22]
        database: [postgres, mysql, sqlite, mongodb]
        redis-version: [6, 7]
      include:
        - platform: ubuntu-latest
          node-version: 18
          extra-flag: true
      exclude:
        platform: windows-latest
        node-version: 14

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run tests
        run: npm test
        env:
          DB_TYPE: ${{ matrix.database }}

  docker-build:
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        platform: [ubuntu-latest, windows-latest]
        dockerfile: [Dockerfile, Dockerfile.slim, Dockerfile.alpine]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f ${{ matrix.dockerfile }} -t app:${{ matrix.platform }} .

      - name: Run container tests
        run: docker run --rm app:${{ matrix.platform }} npm test

  integration:
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    strategy:
      matrix:
        service: [api, worker, scheduler, gateway, auth, notifications, analytics, reporting]
        environment: [staging, production, dev, qa, perf, uat]
        region: [us-east-1, us-west-2, eu-west-1, ap-southeast-1]
    steps:
      - uses: actions/checkout@v4
      - name: Run integration tests
        run: ./run-integration.sh ${{ matrix.service }} ${{ matrix.environment }} ${{ matrix.region }}
