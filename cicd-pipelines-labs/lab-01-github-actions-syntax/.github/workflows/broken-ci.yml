name: Broken CI Pipeline
on:
  push_request:
    branches: [main]
  pull:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout
    - name: Setup Node
      uses: actions/setup-node
      with:
        node-version: '18'
    - name: Install dependencies
        run: npm ci
    - name: Run tests
      run: npm test
    - name: Build
      run: npm run build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout
       - name: Run linter
        run: npm run lint
