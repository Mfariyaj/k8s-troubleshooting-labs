name: Build and Deploy
on:
  push:
    branches: [main]

env:
  API_KEY: ${{ secrets.API_KEY }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug environment
        run: |
          echo "=== Debug Info ==="
          echo "API Key: ${{ secrets.API_KEY }}"
          echo "DB Password: ${DB_PASSWORD}"
          echo "All env vars:"
          env | sort
          echo "=== End Debug ==="

      - name: Configure API
        run: |
          echo "Setting up API with key: $API_KEY"
          curl -H "Authorization: Bearer ${{ secrets.API_KEY }}" https://api.example.com/health

      - name: Build application
        run: npm run build

      - name: Deploy
        if: ${{ secrets.DEPLOY_TOKEN != '' }}
        run: |
          echo "Deploying with token: ${{ secrets.DEPLOY_TOKEN }}"
          ./deploy.sh --token "${{ secrets.DEPLOY_TOKEN }}"

  notify:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Send notification
        run: |
          curl -X POST https://fake-webhook.example.com/services/${{ secrets.SLACK_WEBHOOK }} \
            -d "{\"text\": \"Deploy complete. API Key used: ${{ secrets.API_KEY }}\"}"
