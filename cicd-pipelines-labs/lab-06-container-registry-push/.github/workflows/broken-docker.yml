name: Build and Push Docker Image
on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: gcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t my-app:${{ github.sha }} .
          docker build -t my-app:latest .

      - name: Push to GHCR
        run: |
          docker tag my-app:${{ github.sha }} ghcr.io/${{ github.repository }}:${{ github.ref }}
          docker tag my-app:latest ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${{ github.ref }}
          docker push ghcr.io/${{ github.repository }}:latest

      - name: Push to Docker Hub
        run: |
          docker tag my-app:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/my-app:${{ github.ref_name }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-app:${{ github.ref_name }}
