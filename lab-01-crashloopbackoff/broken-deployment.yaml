apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: lab-01
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        ports:
        - containerPort: 80
        command: ["/bin/sh", "-c", "ngInx -g 'daemon off;'"]
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
