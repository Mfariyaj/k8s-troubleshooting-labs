version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8085:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
      - backend3
    networks:
      - lab05-network

  backend1:
    build: ./backend
    environment:
      - SERVER_ID=backend-1
    expose:
      - "3000"
    networks:
      - lab05-network

  backend2:
    build: ./backend
    environment:
      - SERVER_ID=backend-2
    expose:
      - "3000"
    networks:
      - lab05-network

  backend3:
    build: ./backend
    environment:
      - SERVER_ID=backend-3
    expose:
      - "3000"
    networks:
      - lab05-network

networks:
  lab05-network:
    driver: bridge
