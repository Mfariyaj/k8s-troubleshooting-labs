worker_processes 1;

events {
    worker_connections 1024;
}

http {
    upstream backend_pool {
        # BUG: ip_hash causes all requests from the same NAT IP to go to one backend
        # When all clients share a single public IP (corporate NAT, VPN, etc.),
        # all traffic lands on a single backend server
        ip_hash;

        server backend1:3000;
        server backend2:3000;
        server backend3:3000;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://backend_pool;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
