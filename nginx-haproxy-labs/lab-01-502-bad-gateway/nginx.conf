worker_processes 1;

events {
    worker_connections 1024;
}

http {
    upstream backend {
        # BUG: App listens on port 3000, but upstream points to 3001
        server app:3001;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://backend;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }

        error_page 502 /502.html;
        location = /502.html {
            return 502 '{"error": "Bad Gateway", "message": "The upstream server is not responding"}';
            add_header Content-Type application/json;
        }
    }
}
