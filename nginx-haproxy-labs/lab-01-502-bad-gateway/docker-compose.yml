version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - lab01-network

  app:
    build: ./app
    expose:
      - "3000"
    networks:
      - lab01-network

networks:
  lab01-network:
    driver: bridge
