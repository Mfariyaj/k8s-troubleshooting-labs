worker_processes 1;

events {
    worker_connections 1024;
}

http {
    upstream backend {
        server app:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # BUG: Nginx redirects ALL HTTP traffic to HTTPS
        # But there's no HTTPS listener! And the backend app also does its own redirect.
        # This creates an infinite redirect loop:
        # Client → Nginx (80) → 301 to https:// → Client → (no 443 listener, or...)
        # If using a separate TLS terminator, the request comes back as HTTP internally
        # causing: Client → TLS → Nginx (80) → 301 https → Client → TLS → Nginx (80) → 301...
        return 301 https://$host$request_uri;
    }

    server {
        listen 8080;
        server_name localhost;

        location / {
            proxy_pass http://backend;
            # BUG: Not setting X-Forwarded-Proto, so app doesn't know it's already HTTPS
            proxy_set_header Host $host;
        }
    }
}
