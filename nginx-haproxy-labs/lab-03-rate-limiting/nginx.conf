worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # BUG: Extremely aggressive rate limiting - 1 request per second with NO burst
    # This applies to ALL requests including health checks from load balancers
    limit_req_zone $binary_remote_addr zone=global_limit:10m rate=1r/s;

    upstream backend {
        server app:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # Rate limiting applied globally - no exceptions for health checks
        limit_req zone=global_limit burst=0 nodelay;
        limit_req_status 429;

        # Health check endpoint - ALSO rate limited!
        location /health {
            proxy_pass http://backend;
        }

        # API endpoints
        location /api {
            proxy_pass http://backend;
        }

        location / {
            proxy_pass http://backend;
        }
    }
}
