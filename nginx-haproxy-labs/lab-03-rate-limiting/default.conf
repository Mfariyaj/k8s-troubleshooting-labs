server {
    listen 3000;
    server_name localhost;

    location /health {
        return 200 '{"status": "healthy", "timestamp": "$time_iso8601"}';
        add_header Content-Type application/json;
    }

    location /api {
        return 200 '{"data": "API response", "timestamp": "$time_iso8601"}';
        add_header Content-Type application/json;
    }

    location / {
        return 200 '{"message": "Welcome!", "timestamp": "$time_iso8601"}';
        add_header Content-Type application/json;
    }
}
