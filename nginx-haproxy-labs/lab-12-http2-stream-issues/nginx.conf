worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time '
                    'uct=$upstream_connect_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # BUG: keepalive_requests too low for HTTP/2 multiplexed connections
    # HTTP/2 reuses a single connection for hundreds of concurrent streams
    # 100 requests will exhaust the connection quickly, causing GOAWAY
    keepalive_requests 100;
    keepalive_timeout 65;

    # BUG: large_client_header_buffers too small for HTTP/2 HPACK decoded headers
    # HTTP/2 HPACK can decompress headers to much larger sizes than HTTP/1.1
    large_client_header_buffers 2 1k;

    # BUG: http2_max_concurrent_streams=1 effectively disables multiplexing
    # This means only 1 stream at a time, causing serialization and GOAWAY floods
    http2_max_concurrent_streams 1;

    # Additional HTTP/2 settings that compound the issue
    http2_recv_timeout 30s;
    http2_idle_timeout 3m;

    upstream backend_pool {
        # BUG: No keepalive to backend means each proxied request opens new connection
        # This creates head-of-line blocking at the proxy layer
        server backend:3000;
    }

    server {
        listen 443 ssl http2;
        server_name app.example.com localhost;

        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        # HTTP/2 specific settings
        client_max_body_size 10m;
        client_body_buffer_size 128k;

        location / {
            # BUG: proxy_http_version 1.1 means backend connections don't use HTTP/2
            # All multiplexed streams must be serialized onto HTTP/1.1 connections
            # This creates head-of-line blocking: stream N+1 waits for stream N
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://backend_pool;

            # Timeout settings
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 30s;

            # BUG: proxy_buffering off with HTTP/2 causes backpressure issues
            proxy_buffering off;
        }

        location /grpc {
            # gRPC proxying (also over HTTP/2)
            grpc_pass grpc://backend:50051;

            # BUG: grpc_send_timeout too low for streaming RPCs
            # Long-running streams will be terminated after 5 seconds
            grpc_send_timeout 5s;
            grpc_read_timeout 5s;

            # gRPC error handling
            error_page 502 = /error502grpc;
        }

        location = /error502grpc {
            internal;
            default_type application/grpc;
            add_header grpc-status 14;
            add_header grpc-message "Backend unavailable";
            return 204;
        }

        # Status endpoint
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.0.0.0/8;
            deny all;
        }
    }
}
