version: '3.8'

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: http2-nginx
    ports:
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - http2-net

  backend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: http2-backend
    expose:
      - "3000"
      - "50051"
    networks:
      - http2-net
    environment:
      - NODE_ENV=production
      - SLOW_RESPONSE_MS=2000
      - CONCURRENT_LIMIT=50

networks:
  http2-net:
    driver: bridge
