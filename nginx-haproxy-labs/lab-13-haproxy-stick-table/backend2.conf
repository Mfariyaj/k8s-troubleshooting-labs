server {
    listen 80;
    server_name _;

    location /health {
        return 200 '{"status":"healthy","backend":"backend2"}';
        add_header Content-Type application/json;
    }

    location / {
        return 200 '{"message":"Response from backend2","server_id":"backend2","timestamp":"$time_iso8601"}';
        add_header Content-Type application/json;
        add_header X-Backend-Server backend2;
    }
}
