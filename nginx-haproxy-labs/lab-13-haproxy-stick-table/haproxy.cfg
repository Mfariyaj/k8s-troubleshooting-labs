global
    log stdout format raw local0 debug
    maxconn 4096
    stats timeout 30s
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    errorfile 400 /usr/local/etc/haproxy/errors/400.http
    errorfile 403 /usr/local/etc/haproxy/errors/403.http
    errorfile 408 /usr/local/etc/haproxy/errors/408.http
    errorfile 500 /usr/local/etc/haproxy/errors/500.http
    errorfile 502 /usr/local/etc/haproxy/errors/502.http
    errorfile 503 /usr/local/etc/haproxy/errors/503.http
    errorfile 504 /usr/local/etc/haproxy/errors/504.http

# BUG 1: Peers section name is "mycluster" but process name / -L flag would be "haproxy1"
# The peers section name doesn't match what's expected
# BUG 2: Peer port for haproxy2 is wrong (10001 instead of 10000)
peers mycluster
    peer haproxy_node1 172.25.0.10:10000
    peer haproxy_node2 172.25.0.11:10001

frontend http_front
    bind *:80
    bind *:10000

    # Track client by source IP for session persistence
    default_backend http_back

backend http_back
    balance roundrobin
    
    # BUG 3: stick-table type is "string" but we're storing IP addresses
    # Should be type "ip" for source IP tracking
    # BUG 4: expire 10s is too short - sessions lost after 10 seconds of inactivity
    # BUG 5: size 1k is too small for any real traffic - table overflow causes evictions
    stick-table type string len 32 size 1k expire 10s peers mycluster
    
    # Stick on source IP
    stick on src
    stick store-request src

    # Health checks
    option httpchk GET /health
    http-check expect status 200

    server backend1 172.25.0.20:80 check inter 2s rise 2 fall 3
    server backend2 172.25.0.21:80 check inter 2s rise 2 fall 3
    server backend3 172.25.0.22:80 check inter 2s rise 2 fall 3

# Stats interface
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-legends
    stats show-node
    http-request use-service prometheus-exporter if { path /metrics }
