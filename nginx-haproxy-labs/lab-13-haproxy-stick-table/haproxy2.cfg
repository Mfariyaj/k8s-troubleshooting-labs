global
    log stdout format raw local0 debug
    maxconn 4096
    stats timeout 30s
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    errorfile 400 /usr/local/etc/haproxy/errors/400.http
    errorfile 403 /usr/local/etc/haproxy/errors/403.http
    errorfile 408 /usr/local/etc/haproxy/errors/408.http
    errorfile 500 /usr/local/etc/haproxy/errors/500.http
    errorfile 502 /usr/local/etc/haproxy/errors/502.http
    errorfile 503 /usr/local/etc/haproxy/errors/503.http
    errorfile 504 /usr/local/etc/haproxy/errors/504.http

# BUG: Same issues as haproxy.cfg
# Peers section name "mycluster" doesn't match
# Port 10001 is wrong for peer haproxy_node1 connection back
peers mycluster
    peer haproxy_node1 172.25.0.10:10001
    peer haproxy_node2 172.25.0.11:10000

frontend http_front
    bind *:80
    bind *:10000

    default_backend http_back

backend http_back
    balance roundrobin
    
    # Same bugs as peer1 - must be identical for replication to work
    stick-table type string len 32 size 1k expire 10s peers mycluster
    
    stick on src
    stick store-request src

    option httpchk GET /health
    http-check expect status 200

    server backend1 172.25.0.20:80 check inter 2s rise 2 fall 3
    server backend2 172.25.0.21:80 check inter 2s rise 2 fall 3
    server backend3 172.25.0.22:80 check inter 2s rise 2 fall 3

frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-legends
    stats show-node
    http-request use-service prometheus-exporter if { path /metrics }
