server {
    listen 80;
    server_name _;

    location /health {
        return 200 '{"status":"healthy","backend":"backend1"}';
        add_header Content-Type application/json;
    }

    location / {
        return 200 '{"message":"Response from backend1","server_id":"backend1","timestamp":"$time_iso8601"}';
        add_header Content-Type application/json;
        add_header X-Backend-Server backend1;
    }
}
