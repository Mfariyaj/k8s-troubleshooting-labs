version: '3.8'

services:
  openresty:
    image: openresty/openresty:1.25.3.1-alpine
    container_name: lua-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./lua:/usr/local/openresty/nginx/lua:ro
    depends_on:
      - backend
    networks:
      - lua-net
    environment:
      - LUA_PATH=/usr/local/openresty/nginx/lua/?.lua;;

  backend:
    image: nginx:1.25-alpine
    container_name: lua-backend
    expose:
      - "8080"
    volumes:
      - ./backend.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - lua-net

networks:
  lua-net:
    driver: bridge
