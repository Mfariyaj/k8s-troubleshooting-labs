server {
    listen 8080;
    server_name _;

    location /health {
        return 200 '{"status":"healthy","service":"backend"}';
        add_header Content-Type application/json;
    }

    location / {
        return 200 '{"message":"Response from backend","uri":"$request_uri","timestamp":"$time_iso8601"}';
        add_header Content-Type application/json;
    }
}
