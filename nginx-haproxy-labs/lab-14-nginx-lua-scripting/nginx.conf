worker_processes auto;
error_log /var/log/nginx/error.log debug;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # BUG: lua_shared_dict size 1k is far too small
    # At ~100 bytes per route entry, this can hold maybe 10 entries
    # Once full, set() returns nil + "no memory" error
    lua_shared_dict route_cache 1k;
    lua_shared_dict rate_limit 1k;

    # BUG: init_by_lua_block tries to access ngx.var which is not available
    # in the init context (no request context exists at init time)
    init_by_lua_block {
        local cjson = require "cjson"
        
        -- BUG: ngx.var is not available in init_by_lua context
        -- This will cause "no request found" error at startup
        local config_path = ngx.var.document_root or "/etc/nginx"
        
        -- Try to load routing table
        ROUTES = {
            ["/api/v1/users"] = "http://user-service:8080",
            ["/api/v1/orders"] = "http://order-service:8080",
            ["/api/v1/products"] = "http://product-service:8080",
        }
        
        ngx.log(ngx.INFO, "Routing table loaded: " .. #ROUTES .. " routes")
    }

    # BUG: lua_code_cache off disables LuaJIT compilation
    # This means PCRE JIT won't work and performance degrades massively
    lua_code_cache off;

    upstream backends {
        server backend:8080;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # BUG: set_by_lua_block does NOT support cosocket API (ngx.socket.tcp)
        # Cosockets are only available in rewrite_by_lua, access_by_lua, content_by_lua
        # Using cosocket here will throw "API disabled in the context of set_by_lua*"
        set_by_lua_block $backend_url {
            local sock = ngx.socket.tcp()
            sock:settimeout(1000)
            
            -- Try to connect to service registry to get backend URL
            local ok, err = sock:connect("consul", 8500)
            if not ok then
                return "http://backend:8080"
            end
            
            local req = "GET /v1/catalog/service/backend HTTP/1.1\r\nHost: consul\r\n\r\n"
            sock:send(req)
            local data = sock:receive("*a")
            sock:close()
            
            return "http://backend:8080"
        }

        location / {
            # access_by_lua for rate limiting and dynamic routing
            access_by_lua_block {
                local route_cache = ngx.shared.route_cache
                local uri = ngx.var.uri
                
                -- Try to get cached route
                local cached = route_cache:get(uri)
                if cached then
                    ngx.var.backend_url = cached
                    return
                end
                
                -- Dynamic routing logic
                local router = require "router"
                local target, err = router.resolve(uri)
                
                if not target then
                    ngx.log(ngx.ERR, "Route resolution failed: ", err)
                    return ngx.exit(503)
                end
                
                -- BUG: shared dict too small, this will fail with "no memory"
                local ok, err, forcible = route_cache:set(uri, target, 60)
                if not ok then
                    ngx.log(ngx.ERR, "Failed to cache route: ", err)
                end
                
                ngx.var.backend_url = target
            }

            proxy_pass $backend_url;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            content_by_lua_block {
                local route_cache = ngx.shared.route_cache
                local cjson = require "cjson"
                
                local stats = {
                    route_cache_capacity = route_cache:capacity(),
                    route_cache_free = route_cache:free_space(),
                    status = "ok"
                }
                
                ngx.header["Content-Type"] = "application/json"
                ngx.say(cjson.encode(stats))
            }
        }

        # Timer-based background tasks
        location /init-workers {
            content_by_lua_block {
                -- BUG: ngx.timer.at callback errors are silently swallowed
                -- If the callback throws, you'll never see the error
                local function refresh_routes(premature)
                    if premature then return end
                    
                    -- This will error silently because router module has issues
                    local router = require "router"
                    router.refresh()
                    
                    -- Re-schedule (recursive timer)
                    local ok, err = ngx.timer.at(5, refresh_routes)
                    if not ok then
                        ngx.log(ngx.ERR, "Failed to create timer: ", err)
                    end
                end
                
                local ok, err = ngx.timer.at(0, refresh_routes)
                if not ok then
                    ngx.say("Failed to start background refresh: ", err)
                    return
                end
                
                ngx.say("Background route refresh started")
            }
        }
    }
}
