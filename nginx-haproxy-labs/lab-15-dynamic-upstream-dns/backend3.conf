server {
    listen 80;
    server_name _;

    location /health {
        return 200 '{"status":"healthy","instance":"backend3","ip":"172.28.0.22"}';
        add_header Content-Type application/json;
    }

    location / {
        return 200 '{"message":"Hello from backend3","instance_ip":"172.28.0.22","timestamp":"$time_iso8601"}';
        add_header Content-Type application/json;
        add_header X-Backend-Instance backend3;
    }
}
