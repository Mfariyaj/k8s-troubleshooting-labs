server {
    listen 80;
    server_name _;

    location /health {
        return 200 '{"status":"healthy","instance":"backend1","ip":"172.28.0.20"}';
        add_header Content-Type application/json;
    }

    location / {
        return 200 '{"message":"Hello from backend1","instance_ip":"172.28.0.20","timestamp":"$time_iso8601"}';
        add_header Content-Type application/json;
        add_header X-Backend-Instance backend1;
    }
}
