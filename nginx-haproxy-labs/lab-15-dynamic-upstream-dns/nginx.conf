worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format detailed '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" '
                        'upstream=$upstream_addr '
                        'urt=$upstream_response_time '
                        'status=$upstream_status';

    access_log /var/log/nginx/access.log detailed;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # BUG: Resolver configured with valid=30s but DNS TTL is only 5s
    # This means Nginx caches DNS results for 30 seconds even though
    # the authoritative TTL is 5 seconds. When backends scale down,
    # Nginx will send traffic to stale IPs for up to 30 seconds.
    # BUG: ipv6=on causes AAAA lookups that fail (no IPv6 in Docker network)
    # This adds latency on every resolution and fills error log
    resolver 127.0.0.11 valid=30s ipv6=on;
    resolver_timeout 5s;

    # BUG: Static upstream block - IPs resolved only at startup/reload
    # Adding/removing backends requires nginx -s reload
    # This completely defeats dynamic service discovery
    upstream backend_pool {
        # BUG: No 'zone' directive - required for dynamic upstream updates
        # Without zone, the upstream state cannot be shared between workers
        # and dynamic updates via API are impossible

        # BUG: Static IPs - these are resolved once at config load time
        # If backend containers get new IPs, nginx still sends to old ones
        server 172.28.0.20:80;
        server 172.28.0.21:80;
        server 172.28.0.22:80;

        keepalive 32;
    }

    # Map to allow proxy_pass with variable (forces per-request resolution)
    # BUG: This map exists but isn't used in the main location block
    map $request_uri $dynamic_backend {
        default "http://backend.service.consul";
    }

    server {
        listen 80;
        server_name _;

        location / {
            # BUG: Using upstream name directly means DNS is NOT re-resolved per request
            # Nginx resolved the upstream block's server IPs at config load time
            # To get dynamic resolution, must use a VARIABLE in proxy_pass
            # (e.g., set $backend "http://backend.service.consul"; proxy_pass $backend;)
            proxy_pass http://backend_pool;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Passive health checking
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;
        }

        location /dynamic {
            # This location demonstrates the correct approach (but with bugs)
            # BUG: resolver valid=30s still too long for 5s TTL
            # BUG: ipv6=on causes AAAA lookup failures
            
            # Using variable forces per-request DNS resolution
            set $backend_dynamic "http://backend.service.consul:80";
            proxy_pass $backend_dynamic;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Status and debugging endpoints
        location /nginx_status {
            stub_status on;
            access_log off;
        }

        location /upstream_status {
            # Would require nginx plus or nginx-module-vts
            return 200 '{"upstream":"backend_pool","note":"dynamic updates not available without zone directive"}';
            add_header Content-Type application/json;
        }

        location /resolve_test {
            # Test DNS resolution
            proxy_pass http://127.0.0.11:53;
            proxy_connect_timeout 2s;
        }
    }
}
