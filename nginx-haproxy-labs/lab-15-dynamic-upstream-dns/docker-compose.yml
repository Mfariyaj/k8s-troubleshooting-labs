version: '3.8'

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: dns-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - consul
      - backend1
      - backend2
      - backend3
    networks:
      dns-net:
        ipv4_address: 172.28.0.10
    dns:
      - 172.28.0.2

  # Consul for service discovery (DNS interface)
  consul:
    image: hashicorp/consul:1.17
    container_name: dns-consul
    command: agent -dev -client=0.0.0.0 -dns-port=8600 -recursor=8.8.8.8
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    networks:
      dns-net:
        ipv4_address: 172.28.0.2
    environment:
      - CONSUL_BIND_INTERFACE=eth0

  # Dnsmasq as intermediary DNS (bridges Docker DNS and Consul)
  dnsmasq:
    image: andyshinn/dnsmasq:2.83
    container_name: dns-dnsmasq
    command: >
      --no-daemon
      --log-queries
      --server=/consul/172.28.0.2#8600
      --address=/backend.service.consul/172.28.0.20
      --address=/backend.service.consul/172.28.0.21
      --address=/backend.service.consul/172.28.0.22
      --min-cache-ttl=5
      --max-cache-ttl=5
    cap_add:
      - NET_ADMIN
    networks:
      dns-net:
        ipv4_address: 172.28.0.3
    depends_on:
      - consul

  # Backend services (simulate microservice instances)
  backend1:
    image: nginx:1.25-alpine
    container_name: dns-backend1
    volumes:
      - ./backend1.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      dns-net:
        ipv4_address: 172.28.0.20
    labels:
      - "service.name=backend"

  backend2:
    image: nginx:1.25-alpine
    container_name: dns-backend2
    volumes:
      - ./backend2.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      dns-net:
        ipv4_address: 172.28.0.21
    labels:
      - "service.name=backend"

  backend3:
    image: nginx:1.25-alpine
    container_name: dns-backend3
    volumes:
      - ./backend3.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      dns-net:
        ipv4_address: 172.28.0.22
    labels:
      - "service.name=backend"

networks:
  dns-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
