version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8086:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ws-server
    networks:
      - lab06-network

  ws-server:
    build: ./ws-server
    expose:
      - "3000"
    networks:
      - lab06-network

networks:
  lab06-network:
    driver: bridge
