worker_processes 1;

events {
    worker_connections 1024;
}

http {
    upstream websocket_backend {
        server ws-server:3000;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://websocket_backend;

            # BUG: Missing proxy_http_version 1.1 (defaults to HTTP/1.0 which doesn't support Upgrade)
            # BUG: Missing proxy_set_header Upgrade $http_upgrade;
            # BUG: Missing proxy_set_header Connection "upgrade";
            # The proxy_read_timeout of 60s will also kill idle WebSocket connections

            proxy_set_header Host $host;
            proxy_read_timeout 60s;
        }
    }
}
