worker_processes 1;

events {
    # BUG: Extremely low worker_connections - only 10 simultaneous connections allowed
    worker_connections 10;
}

http {
    upstream backend {
        server app:3000;
        # BUG: No keepalive connections to upstream - every request opens a new connection
    }

    # BUG: keepalive_timeout 0 means connections are closed immediately after response
    # Combined with low worker_connections, this causes connection exhaustion under any load
    keepalive_timeout 0;

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }
    }
}
