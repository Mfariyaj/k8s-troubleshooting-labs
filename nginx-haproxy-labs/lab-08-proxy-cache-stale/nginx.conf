worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # BUG: Cache key does not include any user identifier (cookie, auth header)
    # This means User A's cached response will be served to User B!
    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=app_cache:10m
                     max_size=100m inactive=60m;

    upstream backend {
        server app:3000;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://backend;
            proxy_cache app_cache;

            # BUG: Cache key only uses scheme, host, and URI
            # Missing: cookie, Authorization header, or user identifier
            proxy_cache_key "$scheme$host$request_uri";

            # BUG: No Vary header consideration
            # Responses should vary based on Cookie or Authorization header
            proxy_cache_valid 200 10m;
            proxy_cache_valid 404 1m;

            # Show cache status in response header
            add_header X-Cache-Status $upstream_cache_status;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
