server {
    listen 8080;
    server_name _;

    location /health {
        return 200 '{"status":"healthy","client_dn":"$http_x_ssl_client_dn","verified":"$http_x_ssl_client_verify"}';
        add_header Content-Type application/json;
    }

    location / {
        return 200 '{"message":"Hello from backend","client":"$http_x_ssl_client_dn"}';
        add_header Content-Type application/json;
    }
}
