worker_processes auto;
error_log /var/log/nginx/error.log debug;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format mtls '$remote_addr - $ssl_client_s_dn - [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    'ssl_client_verify=$ssl_client_verify '
                    'ssl_client_serial=$ssl_client_serial';

    access_log /var/log/nginx/access.log mtls;

    # SSL Session caching
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    server {
        listen 8443 ssl;
        server_name api.internal;

        # Server certificate (for TLS handshake)
        ssl_certificate /certs/server.crt;
        ssl_certificate_key /certs/server.key;

        # Client certificate verification - BUG: Only contains Root CA
        # Missing the Intermediate CA that signed client certs
        ssl_client_certificate /certs/ca-bundle.crt;

        # BUG: verify_depth=1 is too shallow for Root -> Intermediate -> Client chain
        # Needs to be at least 2 for a 3-level chain
        ssl_verify_depth 1;

        # Require client certificate
        ssl_verify_client on;

        # BUG: CRL file has expired nextUpdate timestamp
        ssl_crl /certs/ca.crl;

        # OCSP Stapling - BUG: responder URL is unreachable
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /certs/ca-bundle.crt;

        # OCSP responder override - points to non-existent host
        # BUG: This host doesn't exist in the Docker network
        resolver 127.0.0.11 valid=30s;

        # TLS protocol settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;

        location /health {
            # Pass client cert info to backend
            proxy_set_header X-SSL-Client-DN $ssl_client_s_dn;
            proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
            proxy_set_header X-SSL-Client-Serial $ssl_client_serial;
            proxy_pass http://backend:8080;
        }

        location / {
            # Only allow verified clients
            if ($ssl_client_verify != SUCCESS) {
                return 403 "Client certificate verification failed: $ssl_client_verify";
            }

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-SSL-Client-DN $ssl_client_s_dn;
            proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
            proxy_pass http://backend:8080;
        }
    }
}
