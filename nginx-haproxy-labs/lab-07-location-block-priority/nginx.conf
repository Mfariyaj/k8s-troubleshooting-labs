worker_processes 1;

events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;

        # BUG: Location blocks with conflicting/confusing priority
        # The admin expects /api/health to return "Health OK" but the regex match
        # for /api/v[0-9] takes precedence over the prefix match for /api
        # because regex matches override prefix matches (unless ^~ is used)

        # Prefix match for root
        location / {
            return 200 '{"handler": "root", "path": "$uri"}';
            add_header Content-Type application/json;
        }

        # Prefix match for /api
        location /api {
            return 200 '{"handler": "api-prefix", "path": "$uri"}';
            add_header Content-Type application/json;
        }

        # Regex match - this takes priority over /api prefix for paths like /api/v1/*
        # BUG: This regex also accidentally matches /api/validate, /api/versions, etc.
        location ~ /api/v[0-9] {
            return 200 '{"handler": "api-versioned-regex", "path": "$uri"}';
            add_header Content-Type application/json;
        }

        # Exact match for health check - this SHOULD have highest priority
        # BUG: But it's defined as /api/health which won't match /api/health/
        # And the developer expected /api/v1/health to also match here (it won't)
        location = /api/health {
            return 200 '{"handler": "health-exact", "status": "ok"}';
            add_header Content-Type application/json;
        }

        # The developer added this thinking it would catch /api/v1/health
        # BUG: But the regex above already matches /api/v1/* so this never fires
        location /api/v1/health {
            return 200 '{"handler": "v1-health-prefix", "status": "ok"}';
            add_header Content-Type application/json;
        }
    }
}
