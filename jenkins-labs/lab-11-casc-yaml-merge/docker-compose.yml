version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:2.426.1-lts
    container_name: jenkins-casc-lab
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc_configs
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false -Dcasc.jenkins.config=/var/jenkins_home/casc_configs
      - DOCKER_REGISTRY_PASSWORD=fake-docker-password
      - SONARQUBE_TOKEN=fake-sonar-token
      - SLACK_WEBHOOK_URL=https://fake-webhook.example.com/placeholder
      - SSH_PRIVATE_KEY=fake-ssh-key
      - LDAP_BIND_PASSWORD=fake-ldap-password
      - GITHUB_TOKEN=fake-github-token
    volumes:
      - jenkins-data:/var/jenkins_home
      - ./casc:/var/jenkins_home/casc_configs:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  jenkins-data:
