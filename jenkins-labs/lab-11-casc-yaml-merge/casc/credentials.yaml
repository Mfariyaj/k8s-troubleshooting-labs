# Jenkins Configuration as Code - Credentials
# BUG 1: References *ldap-server-config anchor from jenkins.yaml - CROSS-FILE ANCHORS DON'T WORK
# BUG 2: Credential type 'usernamePassword' was renamed to 'usernamePasswordCredentialsImpl' after upgrade
# BUG 3: 'string' credential type was renamed to 'secretText' in newer credentials plugin
# BUG 4: Merge key '<<:' references undefined anchor in this file scope

credentials:
  system:
    domainCredentials:
      - credentials:
          # BUG: 'usernamePassword' is the OLD type name
          # After credentials plugin 1337.v60b_d7b_c7b_c9f+, it's 'usernamePasswordCredentialsImpl'  
          - usernamePassword:
              scope: GLOBAL
              id: "docker-registry-creds"
              username: "deploy-bot"
              password: "${DOCKER_REGISTRY_PASSWORD}"
              description: "Docker Registry Credentials"

          # BUG: 'string' is the OLD type name - now it's 'secretText'
          - string:
              scope: GLOBAL
              id: "sonar-token"
              secret: "${SONARQUBE_TOKEN}"
              description: "SonarQube Analysis Token"

          # BUG: 'string' again - wrong type
          - string:
              scope: GLOBAL
              id: "slack-webhook-token"
              secret: "${SLACK_WEBHOOK_URL}"
              description: "Slack Notification Webhook"

          - basicSSHUserPrivateKey:
              scope: GLOBAL
              id: "ssh-agent-key"
              username: "jenkins"
              passphrase: ""
              description: "SSH Key for Build Agents"
              privateKeySource:
                directEntry:
                  privateKey: "${SSH_PRIVATE_KEY}"

          # BUG: This uses merge key referencing an anchor from jenkins.yaml
          # Cross-file anchor resolution is NOT supported
          - usernamePassword:
              scope: GLOBAL
              id: "ldap-bind-creds"
              <<: *ldap-server-config
              username: "cn=jenkins-svc,ou=service-accounts,dc=company,dc=internal"
              password: "${LDAP_BIND_PASSWORD}"
              description: "LDAP Bind Credentials"

          # BUG: 'usernamePassword' again - wrong type name
          - usernamePassword:
              scope: GLOBAL
              id: "github-app-creds"
              username: "jenkins-ci-bot"
              password: "${GITHUB_TOKEN}"
              description: "GitHub API Token"
