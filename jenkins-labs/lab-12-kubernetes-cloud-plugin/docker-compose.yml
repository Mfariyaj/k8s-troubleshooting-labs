version: '3.8'

services:
  # BUG: Service name is 'jenkins-master' but pod template references 'jenkins'
  jenkins-master:
    image: jenkins/jenkins:2.426.1-lts
    container_name: jenkins-k8s-lab
    ports:
      - "8080:8080"
      # BUG: Port 50000 is NOT exposed here - JNLP agents can't connect back
      # The Kubernetes plugin needs this port for agent communication
      # - "50000:50000"   # INTENTIONALLY COMMENTED OUT
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - JENKINS_OPTS=--prefix=/
      # BUG: JENKINS_URL set to wrong hostname
      - JENKINS_URL=http://jenkins:8080
    volumes:
      - jenkins-data:/var/jenkins_home
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - jenkins-net

networks:
  jenkins-net:
    driver: bridge

volumes:
  jenkins-data:
