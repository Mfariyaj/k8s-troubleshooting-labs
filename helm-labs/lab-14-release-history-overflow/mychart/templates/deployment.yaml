apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    config-version: {{ .Values.config.version | quote }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        config/timestamp: {{ .Values.config.timestamp | quote }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          env:
            - name: CONFIG_VERSION
              value: {{ .Values.config.version | quote }}
            - name: FEATURE_NEW_UI
              value: {{ .Values.config.featureFlags.newUI | quote }}
            - name: FEATURE_BETA_API
              value: {{ .Values.config.featureFlags.betaAPI | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
