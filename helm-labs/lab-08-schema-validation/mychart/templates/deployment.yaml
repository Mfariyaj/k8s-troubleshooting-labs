apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-mychart
  labels:
    app: {{ .Release.Name }}-mychart
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-mychart
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-mychart
    spec:
      containers:
        - name: nginx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
