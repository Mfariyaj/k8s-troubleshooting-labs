apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  # BUG: referencing parent replicaCount directly (doesn't work in subcharts)
  replicas: {{ .Values.global.replicaCount | default .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          # BUG: Using .Values.imageRegistry instead of .Values.global.imageRegistry
          image: "{{ .Values.imageRegistry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: ENVIRONMENT
              # BUG: references .Values.environment instead of .Values.global.environment
              value: {{ .Values.environment | default "unknown" }}
            - name: STORAGE_CLASS
              value: {{ .Values.global.storageClass | default "standard" }}
