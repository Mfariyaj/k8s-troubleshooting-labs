# Lab 02: Become Privilege Escalation - BROKEN Inventory
# ⚠️ This inventory has INTENTIONAL ERRORS

[webservers]
web1 ansible_host=localhost ansible_port=2201 ansible_user=appuser
web2 ansible_host=localhost ansible_port=2202 ansible_user=appuser

[webservers:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

# HINTS:
# - Does 'appuser' exist on the target containers?
# - What user has sudo access? (ansible or deployer)
# - Check the playbook for become settings
