[defaults]
host_key_checking = False
retry_files_enabled = False

# BUG 1: COLLECTIONS_PATHS order is wrong
# Ansible searches paths in order - the FIRST match wins
# Having ./collections AFTER the system path means system-installed
# (potentially old) versions take precedence over project-local ones
collections_paths = /usr/share/ansible/collections:~/.ansible/collections:./collections

# BUG 2: Should be ./collections FIRST so project-local takes precedence:
# collections_paths = ./collections:~/.ansible/collections:/usr/share/ansible/collections

# Library path for local modules
library = ./library

[galaxy]
# BUG 3: server_list with wrong priority can cause resolution issues
server_list = release_galaxy, community_galaxy

[galaxy_server.release_galaxy]
url = https://galaxy.ansible.com/api/

[galaxy_server.community_galaxy]
url = https://galaxy.ansible.com/

# BUG 4: collections_path for galaxy install points to wrong directory
# This means 'ansible-galaxy collection install' puts collections in a
# different place than where ansible looks for them
# Should match the first entry in collections_paths
