# Lab 03: Variable Precedence - Uses local connection for template testing
# The bug is in variable definition, not connectivity

[webservers]
web1 ansible_host=localhost ansible_port=2201 ansible_user=ansible

[appservers]
app1 ansible_host=localhost ansible_port=2202 ansible_user=ansible

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_private_key_file=../../ansible_lab_key
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
