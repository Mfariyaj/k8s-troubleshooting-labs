[defaults]
# BUG: forks set extremely high - causes connection pool exhaustion
# with strategy: free, all 20 hosts run ALL tasks simultaneously
forks = 50

strategy = free
inventory = ./inventory.ini
host_key_checking = False
retry_files_enabled = False
gathering = implicit

# No timeout protection
timeout = 5

[connection]
# BUG: pipelining off + high forks = SSH connection storm
pipelining = False
# Each task opens a new SSH connection per host

[ssh_connection]
# Very aggressive settings that cause pool exhaustion
ssh_args = -o ControlMaster=no -o ControlPersist=no
# BUG: Disabled SSH multiplexing - each task = new TCP connection
# With 20 hosts × 7 tasks × no multiplexing = 140 simultaneous SSH connections
