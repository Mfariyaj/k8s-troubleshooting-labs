---
- name: Configure Nginx web server
  hosts: webservers
  become: yes
  tasks:
    - name: Install nginx
      apt:
        name: nginx
        state: present

    - name: Deploy nginx configuration
      template:
        src: nginx.conf.j2
        dest: /etc/nginx/nginx.conf
      notify: "Restart Nginx"

    - name: Deploy site configuration
      copy:
        content: |
          server {
            listen 80;
            server_name example.com;
            root /var/www/html;
          }
        dest: /etc/nginx/sites-available/default
      notify: "Restart Nginx"

    - name: Ensure nginx is started
      service:
        name: nginx
        state: started
        enabled: yes

  handlers:
    - name: restart nginx
      service:
        name: nginx
        state: restarted
