# Lab 09: Delegate To Wrong Host

[webservers]
web1 ansible_host=localhost ansible_port=2201
web2 ansible_host=localhost ansible_port=2202
web3 ansible_host=localhost ansible_port=2203

[loadbalancers]
lb1 ansible_host=localhost ansible_port=2201

[monitoring]
mon1 ansible_host=localhost ansible_port=2203

[all:vars]
ansible_user=ansible
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_private_key_file=../../ansible_lab_key
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
