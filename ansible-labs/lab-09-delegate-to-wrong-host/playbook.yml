---
- name: Deploy and register service with load balancer
  hosts: webservers
  become: yes
  tasks:
    - name: Install nginx on web server
      apt:
        name: nginx
        state: present

    - name: Deploy application
      copy:
        src: app/
        dest: /opt/myapp/

    - name: Register this server with the load balancer
      uri:
        url: "http://{{ lb_server }}/api/register"
        method: POST
        body_format: json
        body:
          hostname: "{{ inventory_hostname }}"
          ip: "{{ ansible_default_ipv4.address }}"
          port: 8080
      delegate_to: "{{ lb_server }}"

    - name: Verify registration on monitoring server
      shell: "curl -s http://{{ monitoring_host }}/api/check/{{ inventory_hostname }}"
      delegate_to: "{{ monitoring_host }}"
      register: health_check

    - name: Display health check result
      debug:
        msg: "{{ health_check.stdout }}"
