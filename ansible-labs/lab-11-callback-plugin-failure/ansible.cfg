[defaults]
# BUG: 'callback_whitelist' is deprecated since Ansible 2.15
# Should use 'callbacks_enabled' instead
callback_whitelist = custom_logger

# Callback plugin path
callback_plugins = ./callback_plugins

# Standard settings
stdout_callback = default
host_key_checking = False
retry_files_enabled = False
inventory = localhost,

[callback_custom_logger]
log_endpoint = http://logging-system.internal:9200/ansible-events/_doc
