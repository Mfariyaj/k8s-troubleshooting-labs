[defaults]
# Fact caching configuration - MULTIPLE BUGS HERE
inventory = ./inventory.ini
host_key_checking = False
retry_files_enabled = False
gathering = smart

# Enable fact caching with Redis backend
fact_caching = redis

# BUG 1: fact_caching_prefix is EMPTY
# Without a prefix, all hosts share the same Redis key namespace
# This causes facts from host-A to be returned for host-B
# Should be something like: fact_caching_prefix = ansible_facts_
fact_caching_prefix =

# BUG 2: Timeout set to 24 hours (86400 seconds)
# Stale facts persist for an entire day even if host config changes
# Should be much shorter (300-600 seconds) for dynamic environments
fact_caching_timeout = 86400

# BUG 3: fact_caching_connection string is wrong
# Missing proper Redis URI format, no database number specified
# This defaults to db=0 which may conflict with other applications
fact_caching_connection = localhost:6379:0

[inventory]
# Enables inventory caching too (compounds the problem)
cache = True
cache_plugin = redis
cache_timeout = 86400
cache_connection = localhost:6379:0
cache_prefix =
