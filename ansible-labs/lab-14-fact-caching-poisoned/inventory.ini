# Inventory simulating multiple hosts that share a fact cache
[webservers]
web-01 ansible_connection=local ansible_hostname=web-01
web-02 ansible_connection=local ansible_hostname=web-02
web-03 ansible_connection=local ansible_hostname=web-03

[dbservers]
db-01 ansible_connection=local ansible_hostname=db-01
db-02 ansible_connection=local ansible_hostname=db-02

[loadbalancers]
lb-01 ansible_connection=local ansible_hostname=lb-01

[all:vars]
ansible_python_interpreter=/usr/bin/python3
