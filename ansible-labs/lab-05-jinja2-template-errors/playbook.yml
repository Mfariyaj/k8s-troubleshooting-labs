---
- name: Deploy Nginx with custom configuration
  hosts: webservers
  become: yes
  vars:
    server_name: example.com
    listen_port: 80
    worker_processes: 4
    # Note: 'upstream_servers' is NOT defined here
  tasks:
    - name: Install nginx
      apt:
        name: nginx
        state: present

    - name: Deploy nginx configuration template
      template:
        src: templates/nginx.conf.j2
        dest: /etc/nginx/nginx.conf
      notify: restart nginx

    - name: Ensure nginx is running
      service:
        name: nginx
        state: started
        enabled: yes

  handlers:
    - name: restart nginx
      service:
        name: nginx
        state: restarted
