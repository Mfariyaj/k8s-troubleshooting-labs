---
# Note: variable is nginx_server_name, NOT server_name
nginx_server_name: "app.example.com"
nginx_port: 80
nginx_ssl_enabled: true
nginx_ssl_cert: "/etc/ssl/certs/app.crt"
nginx_ssl_key: "/etc/ssl/private/app.key"

# Note: variable is virtual_hosts, NOT vhosts
virtual_hosts:
  - name: "api.example.com"
    port: 8080
    upstream: "api_backend"
    ssl: true
  - name: "admin.example.com"
    port: 8081
    upstream: "admin_backend"
    ssl: false

upstream_servers:
  - "10.0.1.10:8080"
  - "10.0.1.11:8080"
  - "10.0.1.12:8080"

worker_processes: 4
worker_connections: 2048
