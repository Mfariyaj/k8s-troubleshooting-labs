# /etc/sysctl.d/99-network-tuning.conf
# "Optimized" network settings — applied by junior engineer
# Ticket: INFRA-4921 "Reduce memory usage on web proxies"

# NAPI polling budget - "lower = less CPU waste" (WRONG!)
net.core.netdev_budget = 10
net.core.netdev_budget_usecs = 1000

# Backlog queue - "we don't need large queues" (WRONG!)
net.core.netdev_max_backlog = 128

# Socket buffers - reduced to "save memory"
net.core.rmem_max = 131072
net.core.wmem_max = 131072
net.core.rmem_default = 65536
net.core.wmem_default = 65536

# TCP buffer auto-tuning - crippled
net.ipv4.tcp_rmem = 4096 65536 131072
net.ipv4.tcp_wmem = 4096 65536 131072

# Somaxconn - low to "prevent connection flooding"
net.core.somaxconn = 128

# Conntrack - low to "save memory"
net.netfilter.nf_conntrack_max = 32768

# Disable busy polling - "saves CPU"
net.core.busy_read = 0
net.core.busy_poll = 0

# ARP cache - minimal
net.ipv4.neigh.default.gc_thresh1 = 32
net.ipv4.neigh.default.gc_thresh2 = 64
net.ipv4.neigh.default.gc_thresh3 = 128
