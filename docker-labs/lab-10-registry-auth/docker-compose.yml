version: "3.8"

services:
  api:
    # BUG: Private registry that requires authentication
    # This registry doesn't exist/isn't accessible
    image: registry.internal.company.io/myteam/api-service:v2.1.0
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis

  worker:
    # BUG: Wrong registry URL (different subdomain)
    image: registry.internal.company.io/myteam/worker-service:v2.1.0
    environment:
      - QUEUE_URL=redis://redis:6379
      - DB_HOST=postgres
    depends_on:
      - redis
      - postgres

  scheduler:
    # BUG: Image tag doesn't exist (v3.0.0-beta doesn't exist)
    image: registry.internal.company.io/myteam/scheduler-service:v3.0.0-beta
    environment:
      - SCHEDULE_INTERVAL=60
      - API_URL=http://api:8080
    depends_on:
      - api

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=myapp
    volumes:
      - pg-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

volumes:
  pg-data:
