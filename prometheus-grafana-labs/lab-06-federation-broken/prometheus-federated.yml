# Federated Prometheus Instance
# This instance collects metrics locally and exposes them via /federate

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus-federated'
    static_configs:
      - targets: ['localhost:9091']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
