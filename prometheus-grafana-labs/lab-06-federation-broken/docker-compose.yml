version: '3.8'

services:
  prometheus-primary:
    image: prom/prometheus:v2.47.0
    container_name: prometheus-primary-lab06
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus-primary.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.listen-address=:9090'
    networks:
      - monitoring

  prometheus-federated:
    image: prom/prometheus:v2.47.0
    container_name: prometheus-federated-lab06
    ports:
      - "9091:9091"
    volumes:
      - ./prometheus-federated.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.listen-address=:9091'
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: node-exporter-lab06
    ports:
      - "9100:9100"
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge
