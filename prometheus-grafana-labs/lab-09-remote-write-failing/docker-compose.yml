version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus-lab09
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: node-exporter-lab09
    ports:
      - "9100:9100"
    networks:
      - monitoring

  # Simulated remote write receiver (Thanos Receive)
  thanos-receive:
    image: thanosio/thanos:v0.32.2
    container_name: thanos-receive-lab09
    ports:
      - "19291:19291"
      - "10902:10902"
    command:
      - 'receive'
      - '--tsdb.path=/data'
      - '--grpc-address=0.0.0.0:10901'
      - '--http-address=0.0.0.0:10902'
      - '--remote-write.address=0.0.0.0:19291'
      - '--label=receive_replica="0"'
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge
