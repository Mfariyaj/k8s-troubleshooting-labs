[server]
http_port = 3000
domain = localhost
root_url = %(protocol)s://%(domain)s:%(http_port)s/

[security]
admin_user = admin
admin_password = admin123
# BUG: Secret key should not be default in production
secret_key = SW2YcwTIb9zpOOhoPsMm

[users]
allow_sign_up = false
auto_assign_org = true
# BUG: Auto-assigns Admin role to all new users — overrides RBAC folder permissions
auto_assign_org_role = Admin

[auth]
# BUG: Anonymous access enabled AND overrides RBAC
disable_login_form = false

[auth.anonymous]
# BUG: Anonymous access is enabled with Viewer role
# This means unauthenticated users can see ALL folders regardless of RBAC
enabled = true
org_name = Main Org.
org_role = Viewer
# BUG: hide_version does nothing to restrict access when anonymous is enabled

[rbac]
# BUG: permission_cache set to false — performance issue but not the main bug
permission_cache = false

[feature_toggles]
# BUG: nestedFolders enabled but nested folder permission inheritance is disabled
enable = nestedFolders

[unified_alerting]
enabled = true

[dashboards]
# BUG: default_home_dashboard_path overrides folder-level access
default_home_dashboard_path = /var/lib/grafana/dashboards/team-a.json

[folders]
# BUG: nested_folder_permissions_inheritance explicitly disabled
# This means child folders don't inherit parent folder permissions
# Teams given access to parent folders can't see child folders/dashboards
nested_folder_permissions_inheritance = false

[log]
mode = console
level = debug
