# =============================================================================
# Prometheus Alert Rules - LEARNING GUIDE
# =============================================================================
# Alerts fire when a condition (PromQL expression) is true for a duration
#
# Key concepts:
#   - expr: The PromQL query (must return a value > 0 to fire)
#   - for: How long the condition must be true before alert fires
#   - labels: Metadata attached to the alert (severity, team, etc.)
#   - annotations: Human-readable descriptions
# =============================================================================

groups:
  - name: system-alerts
    rules:

      # Alert when CPU usage > 80% for 2 minutes
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 80% for more than 2 minutes"

      # Alert when memory usage > 85%
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"

      # Alert when disk usage > 90%
      - alert: DiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes / node_filesystem_size_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space low on {{ $labels.instance }}"

  - name: app-alerts
    rules:

      # Alert when our app is down (no metrics received)
      - alert: AppDown
        expr: up{job="sample-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Sample app is DOWN"

      # Alert when error rate > 5%
      - alert: HighErrorRate
        expr: rate(app_requests_total{status="error"}[5m]) / rate(app_requests_total[5m]) > 0.05
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Error rate above 5% on sample app"
