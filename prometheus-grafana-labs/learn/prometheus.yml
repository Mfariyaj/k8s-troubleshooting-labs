# =============================================================================
# Prometheus Configuration - LEARNING GUIDE
# =============================================================================
# This file tells Prometheus WHAT to scrape, HOW OFTEN, and WHERE
#
# Key concepts:
#   - scrape_interval: How often Prometheus pulls metrics from targets
#   - targets: The endpoints Prometheus collects metrics from
#   - metrics_path: The URL path where metrics are exposed (default: /metrics)
#   - scheme: http or https
# =============================================================================

global:
  scrape_interval: 15s      # Scrape targets every 15 seconds
  evaluation_interval: 15s  # Evaluate alerting rules every 15 seconds

# Alert rules file
rule_files:
  - "alert-rules.yml"

# =============================================================================
# SCRAPE CONFIGS - Each job defines a group of targets to scrape
# =============================================================================
scrape_configs:

  # ----- Job 1: Prometheus scrapes ITSELF -----
  # Prometheus exposes its own metrics at /metrics
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ----- Job 2: Node Exporter (Linux system metrics) -----
  # Exposes CPU, memory, disk, network metrics
  # Default port: 9100, path: /metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # ----- Job 3: Our custom Python app -----
  # Exposes application-level metrics (requests, latency, errors)
  - job_name: 'sample-app'
    static_configs:
      - targets: ['sample-app:8000']
