auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  # BUG: Very low timeout — queries killed before completing
  http_server_read_timeout: 2s
  http_server_write_timeout: 2s

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
  filesystem:
    directory: /loki/chunks

ingester:
  chunk_encoding: snappy
  # BUG: chunk_target_size way too large — makes queries load massive chunks
  chunk_target_size: 10485760  # 10MB (should be ~1.5MB)
  chunk_idle_period: 30m
  max_chunk_age: 2h
  chunk_retain_period: 0s

limits_config:
  # BUG: query_timeout is absurdly low — 1 second for any query
  query_timeout: 1s
  # BUG: max_entries_limit too restrictive — can only return 100 log lines
  max_entries_limit_per_query: 100
  # BUG: No split_queries_by_interval — large time ranges processed as single query
  # split_queries_by_interval: 15m  # MISSING
  max_query_series: 500
  max_query_parallelism: 2
  # BUG: Very low ingestion limits
  ingestion_rate_mb: 1
  ingestion_burst_size_mb: 2
  per_stream_rate_limit: 1MB
  per_stream_rate_limit_burst: 2MB
  reject_old_samples: true
  reject_old_samples_max_age: 168h

query_range:
  # BUG: results_cache disabled — every query hits storage directly
  results_cache:
    cache:
      embedded_cache:
        enabled: false
  # BUG: No parallelism for range queries
  parallelise_shardable_queries: false

querier:
  # BUG: max_concurrent very low — queries queue up and timeout
  max_concurrent: 1
  query_timeout: 1s
  # BUG: engine timeout also too low
  engine:
    timeout: 1s

frontend:
  # BUG: No query splitting configured
  max_outstanding_per_tenant: 100
  compress_responses: true

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
