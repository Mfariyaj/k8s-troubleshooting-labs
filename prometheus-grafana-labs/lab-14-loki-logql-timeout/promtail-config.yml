server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  # BUG: Wrong port! Loki listens on 3100, not 3200
  - url: http://loki:3200/loki/api/v1/push
    # BUG: Very aggressive retry that will flood logs with errors
    backoff_config:
      min_period: 100ms
      max_period: 1s
      max_retries: 3
    # BUG: No tenant ID header (though auth is disabled, this can cause issues)
    # tenant_id: fake

scrape_configs:
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: containerlogs
          __path__: /var/log/containers/*.log

  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          __path__: /var/log/syslog

  - job_name: app-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: application
          __path__: /var/log/app/*.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: message
            timestamp: ts
      - labels:
          level:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
