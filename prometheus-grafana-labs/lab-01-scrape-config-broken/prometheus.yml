# Broken Prometheus Configuration - Scrape Config Issues
# There are multiple issues with the scrape configuration below

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    scheme: https
    metrics_path: '/metric'
    static_configs:
      - targets: ['node-exporter:9091']
