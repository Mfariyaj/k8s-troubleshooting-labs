apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: sync-waves-lab
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres-db 5432; do echo waiting for db; sleep 2; done']
      containers:
        - name: app
          image: nginx:1.21
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: postgres-db
            - name: DB_PORT
              value: "5432"
