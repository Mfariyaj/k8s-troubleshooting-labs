apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
  namespace: sync-waves-lab
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-db
  template:
    metadata:
      labels:
        app: postgres-db
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: appdb
            - name: POSTGRES_USER
              value: admin
            - name: POSTGRES_PASSWORD
              value: password123
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-db
  namespace: sync-waves-lab
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  selector:
    app: postgres-db
  ports:
    - port: 5432
      targetPort: 5432
