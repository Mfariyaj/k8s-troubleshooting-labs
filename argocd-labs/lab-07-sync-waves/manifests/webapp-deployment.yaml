apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: sync-waves-ns
  annotations:
    # BUG: Webapp should be wave 3 (last), but is set to wave 1
    # App needs database to be ready but starts first!
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app: webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
        - name: webapp
          image: node:18-alpine
          command: ["node", "server.js"]
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              value: "postgresql://app:password123@postgres-svc:5432/appdb"
            - name: DB_CONNECT_TIMEOUT
              value: "5000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
