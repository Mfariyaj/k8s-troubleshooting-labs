apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # BUG: Overly broad resource exclusions that match ALL Secrets and ConfigMaps
  resource.exclusions: |
    - apiGroups:
        - ""
      kinds:
        - "Secret"
        - "ConfigMap"
      clusters:
        - "*"
