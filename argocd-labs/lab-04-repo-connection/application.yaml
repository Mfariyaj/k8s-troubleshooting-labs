apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: repo-connection-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/internal-corp/private-manifests.git
    targetRevision: HEAD
    path: deployments
  destination:
    server: https://kubernetes.default.svc
    namespace: repo-connection-lab
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
