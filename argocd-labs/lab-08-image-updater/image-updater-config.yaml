apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-image-updater-config
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-image-updater
data:
  # BUG: Registry configuration missing 'myregistry.example.com'
  # Only Docker Hub is configured
  registries.conf: |
    registries:
      - name: Docker Hub
        prefix: docker.io
        api_url: https://registry-1.docker.io
        default: true
      # Missing entry for myregistry.example.com:
      # - name: My Registry
      #   prefix: myregistry.example.com
      #   api_url: https://myregistry.example.com
      #   credentials: secret:argocd/myregistry-creds#creds
  # BUG: Log level set to error only - hides useful warnings
  log.level: "error"
  # Application polling interval
  applications_api: "argocd"
