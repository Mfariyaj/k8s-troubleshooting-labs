apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: image-updater-ns
  labels:
    app: myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: myapp
          # This should be auto-updated to v2.0.0 but Image Updater is broken
          image: myregistry.example.com/myapp:v1.0.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
