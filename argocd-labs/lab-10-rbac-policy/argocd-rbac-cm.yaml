apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-rbac-cm
    app.kubernetes.io/part-of: argocd
data:
  # BUG: Wrong policy syntax - 'p' statements have incorrect format
  # Correct format: p, <role>, <resource>, <action>, <project>/<object>, <allow/deny>
  policy.csv: |
    p, role:developer, applications, sync, default/*, allow
    p, role:developer, applications, get, default/*, allow
    p, role:developer, applications, create default/* allow
    p, role:developer, logs, get, default/*, allow
    g, developer-team, role:developer
  policy.default: role:readonly
  scopes: '[groups]'
