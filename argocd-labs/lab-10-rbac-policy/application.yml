apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: team-alpha-app
  namespace: argocd
spec:
  project: team-alpha
  source:
    repoURL: https://github.com/team-alpha/services.git
    targetRevision: HEAD
    path: deploy/production
  destination:
    server: https://kubernetes.default.svc
    namespace: team-alpha-ns
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
