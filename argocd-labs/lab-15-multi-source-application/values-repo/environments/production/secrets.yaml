# Production secrets values (normally encrypted with SOPS or sealed-secrets)
# Repository: https://git.example.com/platform/helm-values.git
# Path: environments/production/secrets.yaml

secrets:
  database:
    host: "prod-db.cluster-abc123.us-east-1.rds.amazonaws.com"
    port: "5432"
    name: "platform_prod"
    username: "app_user"
    # In reality this would be SOPS-encrypted
    password: "ENC[AES256_GCM,data:...,type:str]"

  redis:
    host: "prod-redis.abc123.ng.0001.use1.cache.amazonaws.com"
    port: "6379"

  externalApi:
    baseUrl: "https://api.partner.example.com/v2"
    apiKey: "ENC[AES256_GCM,data:...,type:str]"
