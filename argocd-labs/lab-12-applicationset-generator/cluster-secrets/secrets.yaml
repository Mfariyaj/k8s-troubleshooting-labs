apiVersion: v1
kind: Secret
metadata:
  name: cluster-secret-prod-us-east
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
    # Note: label key is 'env' not 'environment'
    env: production
    region: us-east-1
type: Opaque
stringData:
  name: prod-us-east
  server: https://prod-us-east.example.com:6443
  config: |
    {
      "bearerToken": "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.fake-token-prod",
      "tlsClientConfig": {
        "insecure": false,
        "caData": "LS0tLS1CRUdJTi..."
      }
    }
---
