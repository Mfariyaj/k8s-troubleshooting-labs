apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: parent-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example-org/gitops-apps.git
    targetRevision: HEAD
    path: argocd-apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
