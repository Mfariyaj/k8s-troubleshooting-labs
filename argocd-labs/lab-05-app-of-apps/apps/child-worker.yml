apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: child-worker
  namespace: argocd
spec:
  # BUG: Using 'restricted' project which doesn't permit this destination
  project: restricted
  source:
    repoURL: https://github.com/example-org/gitops-apps.git
    targetRevision: HEAD
    path: services/worker
  destination:
    server: https://kubernetes.default.svc
    # BUG: 'worker-ns' not permitted in project
    namespace: worker-ns
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
