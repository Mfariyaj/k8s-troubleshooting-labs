apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: health-degraded-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Mfariyaj/k8s-troubleshooting-labs.git
    targetRevision: HEAD
    path: argocd-labs/lab-02-health-degraded/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: health-degraded-lab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
