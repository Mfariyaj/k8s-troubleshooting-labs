apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-app
  namespace: health-degraded-ns
  labels:
    app: frontend-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend-app
  template:
    metadata:
      labels:
        app: frontend-app
    spec:
      containers:
        - name: frontend
          # BUG: This image tag does not exist - will cause ImagePullBackOff
          image: nginx:99.99.99
          ports:
            - containerPort: 80
          # BUG: Liveness probe points to wrong path and wrong port
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          # BUG: Readiness probe has too aggressive timeout
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 1
            timeoutSeconds: 1
            failureThreshold: 1
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
