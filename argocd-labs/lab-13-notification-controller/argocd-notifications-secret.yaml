apiVersion: v1
kind: Secret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
type: Opaque
stringData:
  # BUG 3: Key name mismatch
  # The ConfigMap references $slack-token (with dash)
  # but this secret has 'slack_token' (with underscore)
  # ArgoCD notifications resolves $<key> by looking up the exact key name in the secret
  slack_token: "FAKE-SLACK-TOKEN-REPLACE-ME-1234567890"
