apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notification-test-app
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: "platform-alerts"
    notifications.argoproj.io/subscribe.on-health-degraded.slack: "platform-alerts"
spec:
  project: default
  source:
    repoURL: https://git.example.com/apps/notification-test.git
    targetRevision: main
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: notification-test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
