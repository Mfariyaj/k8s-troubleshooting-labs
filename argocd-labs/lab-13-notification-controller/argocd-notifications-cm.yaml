apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # BUG 4: Service config has wrong indentation — 'token' should be nested
  # under the slack service, but it's at the wrong level making it unparseable.
  # Also references $slack-token but secret has key 'slack_token' (BUG in secret)
  service.slack: |
    token: $slack-token
      apiURL: https://slack.com/api
      username: argocd-bot
      icon: ":argocd:"

  # BUG 1: Trigger condition uses wrong field path
  # Uses app.status.operationState.syncResult.status instead of app.status.sync.status
  trigger.on-sync-succeeded: |
    - when: app.status.operationState.syncResult.status == 'Succeeded'
      send:
        - notification-template-sync

  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send:
        - notification-template-health

  # BUG 2: Template uses undefined function 'timeFormat'
  # Should use time.Parse or built-in Go template functions
  template.notification-template-sync: |
    message: |
      ✅ Application {{.app.metadata.name}} synced successfully!
      Revision: {{.app.status.sync.revision}}
      Time: {{timeFormat .app.status.operationState.finishedAt "2006-01-02 15:04:05"}}
      Project: {{.app.spec.project}}
    slack:
      attachments: |
        [{
          "color": "#18be52",
          "title": "{{ .app.metadata.name }}",
          "fields": [
            {"title": "Sync Status", "value": "{{.app.status.sync.status}}", "short": true},
            {"title": "Repository", "value": "{{.app.spec.source.repoURL}}", "short": true}
          ]
        }]

  template.notification-template-health: |
    message: |
      ⚠️ Application {{.app.metadata.name}} health is {{.app.status.health.status}}!
      Server: {{.app.spec.destination.server}}
      Namespace: {{.app.spec.destination.namespace}}
    slack:
      attachments: |
        [{
          "color": "#f4c030",
          "title": "{{ .app.metadata.name }}",
          "fields": [
            {"title": "Health", "value": "{{.app.status.health.status}}", "short": true},
            {"title": "Message", "value": "{{.app.status.health.message}}", "short": true}
          ]
        }]
