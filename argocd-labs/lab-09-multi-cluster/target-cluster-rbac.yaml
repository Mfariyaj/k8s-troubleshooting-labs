# This file represents the RBAC configuration on the TARGET cluster
# for the ArgoCD manager service account.
# BUG: Only 'view' ClusterRole is bound, not 'admin' or custom full-access role

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-manager
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-manager-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  # BUG: 'view' is read-only - ArgoCD needs admin/cluster-admin to deploy resources
  name: view
subjects:
  - kind: ServiceAccount
    name: argocd-manager
    namespace: kube-system
