apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-app
  namespace: hook-failure-ns
  labels:
    app: backend-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-app
  template:
    metadata:
      labels:
        app: backend-app
    spec:
      containers:
        - name: backend
          image: node:18-alpine
          command: ["node", "server.js"]
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              value: "postgresql://app:password@postgres:5432/appdb"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
