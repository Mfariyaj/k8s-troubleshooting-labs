apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hook-failure-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example-org/apps.git
    targetRevision: HEAD
    path: apps/backend
  destination:
    server: https://kubernetes.default.svc
    namespace: hook-failure-ns
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
