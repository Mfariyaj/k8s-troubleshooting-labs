apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hook-failure-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/argoproj/argocd-example-apps.git
    targetRevision: HEAD
    path: guestbook
  destination:
    server: https://kubernetes.default.svc
    namespace: hook-failure-lab
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
