# Kubernetes Deployment Configuration
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: production
  labels:
    app: web-app
    tier: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-app
  template:
    spec:
      containers:
      - name: web-app
        image: myregistry/web-app:v2.1
        ports:
        - containerPort: 8080
        env:
        - name: DEBUG
          value: yes
        - name: ENABLE_METRICS
          value: no
        - name: LOG_LEVEL
          value: INFO
        - name: PORT
          value: 8080
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web-app-svc
  namespace: production
spec:
  type: ClusterIP
  selector:
    app: web-app
  ports:
  - port: 80
    targetPort: 8080
