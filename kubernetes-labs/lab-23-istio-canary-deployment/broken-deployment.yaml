apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-api-v1
  namespace: lab-23-canary
spec:
  replicas: 3
  selector:
    matchLabels:
      app: product-api
      version: v1
  template:
    metadata:
      labels:
        app: product-api
        version: v1
    spec:
      containers:
      - name: product-api
        image: nginx:1.24
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-api-v2
  namespace: lab-23-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-api
      # BUG: Pod uses 'app-version: v2' but DestinationRule expects 'version: v2'
      app-version: v2
  template:
    metadata:
      labels:
        app: product-api
        # BUG: Wrong label key - should be 'version: v2'
        app-version: v2
    spec:
      containers:
      - name: product-api
        image: nginx:1.25
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: product-api
  namespace: lab-23-canary
spec:
  selector:
    app: product-api
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: product-api-canary
  namespace: lab-23-canary
spec:
  hosts:
  - product-api
  http:
  - route:
    - destination:
        host: product-api
        subset: v1
      # BUG: Weights sum to 110 (90+20), not 100
      weight: 90
    - destination:
        host: product-api
        subset: v2
      weight: 20
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: product-api-destinationrule
  namespace: lab-23-canary
spec:
  host: product-api
  subsets:
  - name: v1
    labels:
      version: v1
  # BUG: Missing v2 subset definition entirely
