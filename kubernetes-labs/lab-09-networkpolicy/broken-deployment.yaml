apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: lab-09
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-api
      role: api
  template:
    metadata:
      labels:
        app: backend-api
        role: api
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-client
  namespace: lab-09
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-client
      role: frontend
  template:
    metadata:
      labels:
        app: frontend-client
        role: frontend
    spec:
      containers:
      - name: curl-client
        image: curlimages/curl:latest
        command: ["sleep", "3600"]
        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
          limits:
            memory: "64Mi"
            cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: lab-09
spec:
  selector:
    app: backend-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-ingress
  namespace: lab-09
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-from-monitoring
  namespace: lab-09
spec:
  podSelector:
    matchLabels:
      app: backend-api
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          role: monitoring
    ports:
    - protocol: TCP
      port: 80
