apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-workload
  namespace: lab-12
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpu-workload
  template:
    metadata:
      labels:
        app: gpu-workload
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: accelerator/gpu
                operator: In
                values:
                - nvidia-tesla-v100
                - nvidia-a100
              - key: node-type
                operator: In
                values:
                - high-memory
      tolerations:
      - key: "gpu-node"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      containers:
      - name: gpu-app
        image: nginx:1.25
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
