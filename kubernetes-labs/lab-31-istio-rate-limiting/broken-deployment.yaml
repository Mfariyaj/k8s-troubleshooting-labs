apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: lab-31-ratelimit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: nginx:1.24
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-backend
  namespace: lab-31-ratelimit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-backend
  template:
    metadata:
      labels:
        app: api-backend
    spec:
      containers:
      - name: api-backend
        image: nginx:1.24
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ratelimit-service
  namespace: lab-31-ratelimit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ratelimit
  template:
    metadata:
      labels:
        app: ratelimit
    spec:
      containers:
      - name: ratelimit
        image: envoyproxy/ratelimit:latest
        ports:
        - containerPort: 8081
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: lab-31-ratelimit
spec:
  selector:
    app: api-gateway
  ports:
  - port: 80
    targetPort: 80
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: api-backend
  namespace: lab-31-ratelimit
spec:
  selector:
    app: api-backend
  ports:
  - port: 80
    targetPort: 80
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: ratelimit-service
  namespace: lab-31-ratelimit
spec:
  selector:
    app: ratelimit
  ports:
  - port: 8081
    targetPort: 8081
    name: grpc
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ratelimit-config
  namespace: lab-31-ratelimit
data:
  config.yaml: |
    domain: api-ratelimit
    descriptors:
      - key: header_match
        value: api-request
        rate_limit:
          unit: minute
          requests_per_unit: 100
---
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: ratelimit-filter
  namespace: lab-31-ratelimit
spec:
  workloadSelector:
    labels:
      app: api-gateway
  configPatches:
  - applyTo: CLUSTER
    # BUG: Should be HTTP_FILTER for HTTP rate limiting
    match:
      context: SIDECAR_INBOUND
    patch:
      # BUG: MERGE won't add a new filter - should be INSERT_BEFORE or ADD
      operation: MERGE
      value:
        name: envoy.filters.http.ratelimit
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.ratelimit.v3.RateLimit
          domain: api-ratelimit
          failure_mode_deny: false
          rate_limit_service:
            grpc_service:
              envoy_grpc:
                # BUG: Wrong cluster name - should reference ratelimit-service
                cluster_name: outbound|8081||ratelimit-wrong.lab-31-ratelimit.svc.cluster.local
            transport_api_version: V3
          rate_limit_service_config: {}
  - applyTo: CLUSTER
    match:
      context: SIDECAR_OUTBOUND
      cluster:
        service: ratelimit-service.lab-31-ratelimit.svc.cluster.local
    patch:
      operation: ADD
      value:
        name: rate_limit_cluster
        type: STRICT_DNS
        connect_timeout: 10s
        lb_policy: ROUND_ROBIN
        http2_protocol_options: {}
        load_assignment:
          cluster_name: rate_limit_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    # BUG: Wrong address for rate limit service
                    address: ratelimit-wrong
                    port_value: 8081
