apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-frontend
  namespace: lab-26-mtls
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-frontend
  template:
    metadata:
      labels:
        app: web-frontend
    spec:
      containers:
      - name: frontend
        image: nginx:1.24
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-backend
  namespace: lab-26-mtls
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-backend
  template:
    metadata:
      labels:
        app: api-backend
    spec:
      containers:
      - name: backend
        image: nginx:1.24
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: lab-26-mtls
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
      annotations:
        # BUG: Sidecar injection disabled on database pod
        sidecar.istio.io/inject: "false"
    spec:
      containers:
      - name: database
        image: mysql:8.0
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "rootpass"
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web-frontend
  namespace: lab-26-mtls
spec:
  selector:
    app: web-frontend
  ports:
  - port: 80
    targetPort: 80
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: api-backend
  namespace: lab-26-mtls
spec:
  selector:
    app: api-backend
  ports:
  - port: 8080
    targetPort: 8080
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: database
  namespace: lab-26-mtls
spec:
  selector:
    app: database
  ports:
  - port: 3306
    targetPort: 3306
    name: tcp-mysql
---
# BUG: Strict mTLS applied namespace-wide, but database has no sidecar
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: strict-mtls
  namespace: lab-26-mtls
spec:
  mtls:
    mode: STRICT
---
# BUG: DestinationRule disabling TLS conflicts with STRICT PeerAuthentication
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: database-dr
  namespace: lab-26-mtls
spec:
  host: database
  trafficPolicy:
    tls:
      # BUG: DISABLE conflicts with STRICT PeerAuthentication
      mode: DISABLE
